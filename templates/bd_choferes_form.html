{% extends "base.html" %}
{% block content %}

<section class="sedes-section" style="max-width:720px">
    <h2>Editar chofer</h2>

    <form method="post" style="margin-top:12px;display:grid;gap:12px">
        <div>
            <label style="font-size:12px;color:#64748b">Nombre</label>
            <input name="agente" type="text" value="{{ r.agente }}"
                style="width:100%;padding:10px;border-radius:10px;border:1px solid #e5e7eb">
        </div>

        <div>
            <label style="font-size:12px;color:#64748b">Activo</label>
            <select name="activo" style="width:100%;padding:10px;border-radius:10px;border:1px solid #e5e7eb">
                <option value="1" {% if r.activo==1 %}selected{% endif %}>Sí</option>
                <option value="0" {% if r.activo==0 %}selected{% endif %}>No</option>
            </select>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-mpd" type="submit" style="padding:10px 16px;border-radius:999px">
                Guardar
            </button>

            <a class="btn btn-mpd" href="{{ url_for('vehiculos.bd_choferes') }}" style="padding:10px 16px;border-radius:999px">
                Cancelar
            </a>
        </div>
    </form>
</section>

{% endblock %}
