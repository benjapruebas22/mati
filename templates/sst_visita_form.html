{% extends "base.html" %}

{% block head_extra %}
  {{ super() }}
  <link rel="stylesheet" href="{{ url_for('static', filename='sst/sst_ui.css', v='2026-05-09') }}">
{% endblock %}

{% block content %}
<section class="sst-ui sst-page-visita-form license-shell">
  <header class="license-head">
    <div>
      <h1 style="margin:0;">Cargar visita SST</h1>
      <p class="hint">Fecha, sede, tipo de visita y estado operativo.</p>
    </div>
    <div class="license-actions" style="margin:0;">
      <a class="btn" href="{{ url_for('sst_visitas') }}">Volver a sedes</a>
      <a class="btn" href="{{ url_for('sst_general') }}">Volver a SG-SST</a>
    </div>
  </header>

  <form class="license-card" method="post" action="{{ url_for('sst_visita_cargar', sede=pre_sede or None) }}">
    <div class="license-grid">
      <div class="license-field">
        <label>Sede</label>
        <select name="sede_codigo" required>
          <option value="">Seleccione...</option>
          {% for s in sedes %}
          <option value="{{ s.codigo }}" {% if pre_sede and pre_sede == s.codigo %}selected{% endif %}>
            {{ s.codigo }} - {{ s.nombre }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="license-field">
        <label>Fecha</label>
        <input type="date" name="fecha" required />
      </div>

      <div class="license-field">
        <label>Tipo de visita</label>
        <select name="tipo_visita">
          <option value="">(Opcional)</option>
          {% for t in tipos %}
          <option value="{{ t }}">{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="license-field">
        <label>Estado de la visita</label>
        <select name="estado">
          <option value="">(Opcional)</option>
          {% for e in estados %}
          <option value="{{ e }}">{{ e|replace('_',' ') }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="license-field full">
        <label>Responsable</label>
        <input name="responsable" placeholder="Ej: Lic. Matias Calderari / ART / Intendencia" />
      </div>

      <div class="license-field full">
        <label>Observacion breve</label>
        <textarea name="observaciones" rows="3" placeholder="Pendientes, notas, lo mas importante..."></textarea>
      </div>
    </div>

    <div class="license-actions">
      <button class="btn primary" type="submit">Guardar visita</button>
    </div>
  </form>
</section>

{% endblock %}
