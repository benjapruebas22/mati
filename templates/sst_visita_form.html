{% extends "base.html" %}

{% block content %}

<style>
  .license-shell {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .license-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .license-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    box-shadow: 0 8px 22px rgba(15, 23, 42, .06);
    padding: 14px 16px;
  }

  .license-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .license-grid .full { grid-column: 1 / -1; }

  .license-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .license-field label {
    font-size: 12px;
    color: #64748b;
  }

  .license-field input,
  .license-field select,
  .license-field textarea {
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    background: #fff;
  }

  .license-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .hint {
    font-size: 12px;
    color: #64748b;
    margin: 0;
  }

  @media (max-width: 720px) {
    .license-grid { grid-template-columns: 1fr; }
  }
</style>

<section class="license-shell">
  <header class="license-head">
    <div>
      <h1 style="margin:0;">Cargar visita SST</h1>
      <p class="hint">Fecha, sede, tipo de visita y estado operativo.</p>
    </div>
    <div class="license-actions" style="margin:0;">
      <a class="btn" href="{{ url_for('sst_visitas') }}">Volver a sedes</a>
      <a class="btn" href="{{ url_for('sst_general') }}">Volver a SG-SST</a>
    </div>
  </header>

  <form class="license-card" method="post" action="{{ url_for('sst_visita_cargar', sede=pre_sede or None) }}">
    <div class="license-grid">
      <div class="license-field">
        <label>Sede</label>
        <select name="sede_codigo" required>
          <option value="">Seleccione...</option>
          {% for s in sedes %}
          <option value="{{ s.codigo }}" {% if pre_sede and pre_sede == s.codigo %}selected{% endif %}>
            {{ s.codigo }} - {{ s.nombre }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="license-field">
        <label>Fecha</label>
        <input type="date" name="fecha" required />
      </div>

      <div class="license-field">
        <label>Tipo de visita</label>
        <select name="tipo_visita">
          <option value="">(Opcional)</option>
          {% for t in tipos %}
          <option value="{{ t }}">{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="license-field">
        <label>Estado de la visita</label>
        <select name="estado">
          <option value="">(Opcional)</option>
          {% for e in estados %}
          <option value="{{ e }}">{{ e|replace('_',' ') }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="license-field full">
        <label>Responsable</label>
        <input name="responsable" placeholder="Ej: Lic. Matias Calderari / ART / Intendencia" />
      </div>

      <div class="license-field full">
        <label>Observacion breve</label>
        <textarea name="observaciones" rows="3" placeholder="Pendientes, notas, lo mas importante..."></textarea>
      </div>
    </div>

    <div class="license-actions">
      <button class="btn primary" type="submit">Guardar visita</button>
    </div>
  </form>
</section>

{% endblock %}
