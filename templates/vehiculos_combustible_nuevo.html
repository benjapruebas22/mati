{% extends "base.html" %}
{% block content %}

<section class="sedes-section">
  <h2>Nueva carga de combustible</h2>

  <form method="post" enctype="multipart/form-data" class="form-soft">

    <label>Fecha</label>
    <input
      type="date"
      name="fecha"
      value="{{ pref_fecha or '' }}"
      required
    >

    <label>Vehículo</label>
    <select name="patente" required>
      {% for v in vehiculos %}
        <option value="{{ v.patente }}"
                {% if v.patente == pref_patente %}selected{% endif %}>
          {{ v.codigo_interno }} — {{ v.patente }}
        </option>
      {% endfor %}
    </select>

    <label>Chofer</label>
    <select name="chofer_id">
      <option value="">(sin chofer)</option>
      {% for c in choferes %}
        <option value="{{ c.id }}"
                {% if pref_chofer_id and (c.id|string) == (pref_chofer_id|string) %}selected{% endif %}>
          {{ c.agente }}
        </option>
      {% endfor %}
    </select>

    <!-- Remito manual (texto) -->
    <label>N° Remito / ticket (texto)</label>
    <input name="remito" placeholder="Ej: 000123 / YPF-456">

    <label>Foto remito (subir o pegar)</label>
    <input type="file" name="remito_file" accept="image/*">
    <input type="hidden" name="remito_paste_data" id="combNuevoPasteData">
    <div id="combNuevoPasteBox" style="margin-top:6px;border:1px dashed #93c5fd;border-radius:10px;padding:10px;color:#1e3a8a;background:#eff6ff;font-size:12px">
      Click aca y pega la foto con <b>Ctrl + V</b>
    </div>
    <img id="combNuevoPastePreview" alt="preview remito" style="display:none;max-width:220px;margin-top:8px;border:1px solid #dbeafe;border-radius:8px">

    <label>Km actual</label>
    <input
      name="km_actual"
      type="number"
      step="1"
      value="{{ pref_km_actual or '' }}"
    >

    <label>Litros</label>
    <input name="litros" type="number" step="0.01" required>

    <label>Precio por litro</label>
    <input name="precio_litro" type="number" step="0.01" required>

    <label>Notas</label>
    <textarea name="notas" rows="3"></textarea>

    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn primary" type="submit">Guardar</button>
      <a class="btn ghost" href="{{ url_for('vehiculos_combustible') }}">Cancelar</a>
    </div>

  </form>
</section>

<script>
  (function setupCombNuevoPasteRemito() {
    var box = document.getElementById("combNuevoPasteBox");
    var hidden = document.getElementById("combNuevoPasteData");
    var preview = document.getElementById("combNuevoPastePreview");
    if (!box || !hidden || !preview) return;

    function setPreview(dataUrl) {
      hidden.value = dataUrl || "";
      if (!dataUrl) {
        preview.style.display = "none";
        preview.removeAttribute("src");
        box.style.background = "#eff6ff";
        box.style.borderColor = "#93c5fd";
        box.innerHTML = "Click aca y pega la foto con <b>Ctrl + V</b>";
        return;
      }
      preview.src = dataUrl;
      preview.style.display = "block";
      box.style.background = "#ecfdf5";
      box.style.borderColor = "#86efac";
      box.textContent = "Imagen pegada lista para guardar.";
    }

    box.tabIndex = 0;
    box.addEventListener("paste", function (ev) {
      var items = (ev.clipboardData && ev.clipboardData.items) ? ev.clipboardData.items : [];
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        if (!it.type || it.type.indexOf("image/") !== 0) continue;
        var file = it.getAsFile();
        if (!file) continue;
        var reader = new FileReader();
        reader.onload = function (e) { setPreview(String((e && e.target && e.target.result) || "")); };
        reader.readAsDataURL(file);
        ev.preventDefault();
        return;
      }
    });
  })();
</script>

{% endblock %}
