{% extends "base.html" %}
{% block extra_head %}
  {{ super() }}
  <link rel="stylesheet" href="{{ url_for('static', filename='album_mundial/album_mundial.css', v='2026-05-11-04') }}">
{% endblock %}
{% block content %}
<section class="album-2026">
  <style>
    /* Módulo privado: sin navegación institucional */
    .topbar{ display:none !important; }
    main.container{ padding-top: 18px; }
  </style>

  <div class="am-shell">
      <header class="am-head">
        <div>
          <div class="am-kicker">⚽ Álbum de Lautaro Romano</div>
          <h1>Álbum Mundial 2026</h1>
          <p>Acceso oculto. Ingresá la clave para abrir el tracker.</p>
        </div>
        <a class="am-link" href="{{ url_for('dashboard') }}">Volver</a>
      </header>

    <div class="am-card am-card-pad" style="max-width:520px;">
      <form method="post" class="am-unlock">
        <label for="password">Clave</label>
        <input id="password" name="password" type="password" placeholder="album2026" autocomplete="current-password" required>
        <button class="am-btn am-btn-primary" type="submit">Ingresar</button>
        <div class="am-help">Tip: si sos Matías, pedime que lo deje automático por usuario.</div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
